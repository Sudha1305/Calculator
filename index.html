<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tillana:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Simple Calculator</h1>
    <div class="container">
        
        <form action="">
        <div class="screen">
            <input type="text" name="display" id="display">
        </div>
        <div class="numpad">
        <div>
            <input class="btn" type="button" value="AC" data-action="clear">
            <input class="btn" type="button" value="C" data-action="backspace">
            <input class="btn" type="button" value="%" data-action="percent">
            <input class="btn" type="button" value="/" data-value="/" class="operator">

        </div>
        <div>
            <input class="btn" type="button" value="7" data-value="7">
            <input class="btn" type="button" value="8" data-value="8">
            <input class="btn" type="button" value="9" data-value="9">
            <input class="btn" type="button" value="*" data-value="*" class="operator">
        </div>
        <div>
            <input class="btn" type="button" value="4" data-value="4">
            <input class="btn" type="button" value="5" data-value="5">
            <input class="btn" type="button" value="6" data-value="6">
            <input class="btn" type="button" value="-" data-value="-" class="operator">

        </div>
        <div>
            <input class="btn" type="button" value="1" data-value="1">
            <input class="btn" type="button" value="2" data-value="2">
            <input class="btn" type="button" value="3" data-value="3">
            <input class="btn" type="button" value="+" data-value="+" class="operator">

        </div>
        <div>
            <input class="btn" type="button" value="00" data-value="00">
            <input class="btn" type="button" value="0" data-value="0">
            <input class="btn" type="button" value="." data-action="dot">

            <input class="btn" type="button" value="=" data-action="equals" class="equal">

        </div>
        </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
