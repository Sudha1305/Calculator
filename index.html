<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tillana:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <h1>Calculator</h1>
        <div class="main-content">
            <div class="calculator">
                <div class="top-bar">
                    <button id="themeToggle" class="theme-btn">🌓</button>
                    <button id="copyBtn" class="copy-btn">📋 Copy</button>
                </div>
                <form action="">
                    <div class="screen">
                        <input type="text" name="display" id="display" readonly value="0">
                    </div>
                    <div class="numpad">
                        <div>
                            <input class="btn special" type="button" value="AC" data-action="clear">
                            <input class="btn special" type="button" value="C" data-action="backspace">
                            <input class="btn special" type="button" value="%" data-action="percent">
                            <input class="btn operator" type="button" value="/" data-value="/">
                        </div>
                        <div>
                            <input class="btn" type="button" value="7" data-value="7">
                            <input class="btn" type="button" value="8" data-value="8">
                            <input class="btn" type="button" value="9" data-value="9">
                            <input class="btn operator" type="button" value="*" data-value="*">
                        </div>
                        <div>
                            <input class="btn" type="button" value="4" data-value="4">
                            <input class="btn" type="button" value="5" data-value="5">
                            <input class="btn" type="button" value="6" data-value="6">
                            <input class="btn operator" type="button" value="-" data-value="-">
                        </div>
                        <div>
                            <input class="btn" type="button" value="1" data-value="1">
                            <input class="btn" type="button" value="2" data-value="2">
                            <input class="btn" type="button" value="3" data-value="3">
                            <input class="btn operator" type="button" value="+" data-value="+">
                        </div>
                        <div>
                            <input class="btn" type="button" value="00" data-value="00">
                            <input class="btn" type="button" value="0" data-value="0">
                            <input class="btn" type="button" value="." data-action="dot">
                            <input class="btn equal" type="button" value="=" data-action="equals">
                        </div>
                    </div>
                </form>
            </div>
            <div class="history-panel">
                <div class="history-header">
                    <h2>History</h2>
                    <button id="clearHistory" class="clear-history-btn">Clear</button>
                </div>
                <div id="historyList" class="history-list"></div>
            </div>
        </div>
    </div>
    <footer class="footer">
      <p class="footer-tagline">✨ Your Perfect Daily Calculator ✨</p>
      <div class="footer-links">
        <span class="kbd-label">⌨️ Keyboard Shortcuts:</span>
        <span class="kbd">ESC</span> Clear
        <span class="kbd">BACKSPACE</span> Delete
        <span class="kbd">ENTER</span> Calculate
      </div>
      <p class="footer-love">Built with Pure JavaScript | No Frameworks Needed</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
